<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global TimeSync | Jam Dunia Real-Time</title>
    
    <!-- Google Fonts: Poppins for modern, clean UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Base Variables and Reset */
        :root {
            --bg-gradient-start: #0f2027;
            --bg-gradient-mid: #203a43;
            --bg-gradient-end: #2c5364;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --accent: #4facfe;
            --btn-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-mid), var(--bg-gradient-end));
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem 1rem;
            line-height: 1.6;
        }

        /* Layout & Containers */
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: var(--btn-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--card-border);
            color: var(--text-main);
        }

        .section {
            margin-bottom: 3.5rem;
        }

        /* Responsive Grid: 1 col mobile, 2 cols desktop */
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Jakarta Hero Card */
        .hero-grid {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .hero-grid .card {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(79, 172, 254, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .hero-grid .time-main {
            font-size: 4.5rem;
            background: var(--btn-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }

        /* Glassmorphism Card Design */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .city-name {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }

        /* Typography for Time and Date */
        .time-display {
            display: flex;
            align-items: baseline;
            justify-content: center;
            margin-bottom: 0.5rem;
            font-variant-numeric: tabular-nums;
        }

        .time-main {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .time-sec {
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--accent);
            margin-left: 4px;
            display: inline-block;
        }

        .date-display {
            font-size: 1rem;
            font-weight: 300;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        /* Subtle Second Tick Animation */
        @keyframes pop {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.15); opacity: 1; color: #00f2fe; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .tick-anim {
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Gemini AI Feature Styles */
        .gemini-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: auto; /* Push to bottom */
        }

        .gemini-btn:hover {
            background: var(--btn-gradient);
            border-color: transparent;
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }
        
        .gemini-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            background: rgba(255, 255, 255, 0.05);
        }

        .gemini-response {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            font-size: 0.9rem;
            color: #e0e0e0;
            text-align: left;
            width: 100%;
            display: none;
            border-left: 3px solid var(--accent);
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <h1>Global TimeSync</h1>
            <p>Pelacakan zona waktu real-time akurat dengan Wawasan AI</p>
        </header>

        <div class="section">
            <div class="hero-grid" id="jakarta-clock">
                <!-- Jakarta Card injected via JS -->
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">Waktu Indonesia Lainnya</h2>
            <div class="grid" id="indonesia-clocks">
                <!-- Cards injected via JS -->
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">Jam Dunia</h2>
            <div class="grid" id="world-clocks">
                <!-- Cards injected via JS -->
            </div>
        </div>
    </div>

    <script>
        // API Configuration
        const apiKey = ""; // Provided by execution environment

        // Configuration for Clocks
        const clocksConfig = {
            jakarta: [
                { id: 'wib', name: 'WIB (Jakarta)', zone: 'Asia/Jakarta', city: 'Jakarta' }
            ],
            indonesia: [
                { id: 'wita', name: 'WITA (Makassar)', zone: 'Asia/Makassar', city: 'Makassar' },
                { id: 'wit', name: 'WIT (Jayapura)', zone: 'Asia/Jayapura', city: 'Jayapura' }
            ],
            world: [
                { id: 'london', name: 'London', zone: 'Europe/London', city: 'London' },
                { id: 'new_york', name: 'New York', zone: 'America/New_York', city: 'New York' },
                { id: 'tokyo', name: 'Tokyo', zone: 'Asia/Tokyo', city: 'Tokyo' },
                { id: 'dubai', name: 'Dubai', zone: 'Asia/Dubai', city: 'Dubai' }
            ]
        };

        // UI Generator Function
        function createClockCard(clock) {
            return `
                <div class="card" id="card-${clock.id}">
                    <div class="city-name">${clock.name}</div>
                    <div class="time-display">
                        <span class="time-main" id="time-${clock.id}">--:--</span>
                        <span class="time-sec" id="sec-${clock.id}">:--</span>
                    </div>
                    <div class="date-display" id="date-${clock.id}">Memuat tanggal...</div>
                    
                    <button class="gemini-btn" id="btn-${clock.id}" onclick="handleGeminiClick('${clock.id}')">
                        ✨ Cek Suasana Lokal
                    </button>
                    <div class="gemini-response" id="response-${clock.id}"></div>
                </div>
            `;
        }

        // Initialize DOM Elements
        const jakartaContainer = document.getElementById('jakarta-clock');
        const indonesiaContainer = document.getElementById('indonesia-clocks');
        const worldContainer = document.getElementById('world-clocks');

        jakartaContainer.innerHTML = clocksConfig.jakarta.map(createClockCard).join('');
        indonesiaContainer.innerHTML = clocksConfig.indonesia.map(createClockCard).join('');
        worldContainer.innerHTML = clocksConfig.world.map(createClockCard).join('');

        // Combine all configurations into a flat array for easy iteration
        const allClocks = [...clocksConfig.jakarta, ...clocksConfig.indonesia, ...clocksConfig.world];

        // Formatters cache to optimize performance
        const formatters = {};
        allClocks.forEach(clock => {
            formatters[clock.id] = {
                time: new Intl.DateTimeFormat('id-ID', {
                    timeZone: clock.zone,
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit',
                    hourCycle: 'h23'
                }),
                date: new Intl.DateTimeFormat('id-ID', {
                    timeZone: clock.zone,
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric'
                })
            };
        });

        const previousSeconds = {};

        // Main Update Loop
        function updateClocks() {
            const now = new Date();

            allClocks.forEach(clock => {
                const clockFormatters = formatters[clock.id];
                
                // Time Parsing
                const timeParts = clockFormatters.time.formatToParts(now);
                let hours = '', minutes = '', seconds = '';
                
                timeParts.forEach(part => {
                    if (part.type === 'hour') hours = part.value;
                    if (part.type === 'minute') minutes = part.value;
                    if (part.type === 'second') seconds = part.value;
                });

                // Date Parsing
                const fullDate = clockFormatters.date.format(now);

                // DOM Updates
                document.getElementById(`time-${clock.id}`).textContent = `${hours}:${minutes}`;
                const secElement = document.getElementById(`sec-${clock.id}`);
                
                if (previousSeconds[clock.id] !== seconds) {
                    secElement.textContent = `:${seconds}`;
                    secElement.classList.remove('tick-anim');
                    void secElement.offsetWidth; 
                    secElement.classList.add('tick-anim');
                    previousSeconds[clock.id] = seconds;
                }

                document.getElementById(`date-${clock.id}`).textContent = fullDate;
            });
        }

        updateClocks();
        setInterval(updateClocks, 1000);

        // --- GEMINI API INTEGRATION ---

        // Exponential backoff retry logic
        async function fetchWithRetry(url, options, maxRetries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return await response.json();
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        }

        async function handleGeminiClick(clockId) {
            const clock = allClocks.find(c => c.id === clockId);
            const btn = document.getElementById(`btn-${clockId}`);
            const responseDiv = document.getElementById(`response-${clockId}`);
            
            // Get current local time strings to feed into the prompt
            const currentTimeStr = document.getElementById(`time-${clockId}`).textContent;
            const currentDateStr = document.getElementById(`date-${clockId}`).textContent;

            // Update UI to loading state
            btn.disabled = true;
            btn.innerHTML = `<span class="loading-spinner"></span> Mengecek suasana...`;
            responseDiv.style.display = 'none';

            const promptText = `Anda adalah asisten perjalanan dan budaya yang ceria. Saat ini tepat pukul ${currentTimeStr} pada tanggal ${currentDateStr} waktu lokal di ${clock.city}. 
            Dalam 2-3 kalimat singkat yang menarik, beri tahu saya apa yang biasanya dilakukan penduduk setempat saat ini, atau seperti apa suasana/vibe saat ini di kota tersebut pada waktu ini.`;

            const payload = {
                contents: [{
                    parts: [{ text: promptText }]
                }],
                systemInstruction: {
                    parts: [{ text: "Selalu jawab dengan ramah, ringkas, dan menggunakan Bahasa Indonesia yang natural. Fokus dengan ketat pada waktu saat ini yang diberikan." }]
                }
            };

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            try {
                const data = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const generatedText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Tidak dapat memuat suasana saat ini.";
                
                // Show response
                responseDiv.innerHTML = generatedText;
                responseDiv.style.display = 'block';

            } catch (error) {
                responseDiv.innerHTML = "Ups, tidak dapat terhubung ke AI saat ini. Silakan coba lagi nanti.";
                responseDiv.style.display = 'block';
            } finally {
                // Restore button state
                btn.disabled = false;
                btn.innerHTML = `✨ Cek Suasana Lokal`;
            }
        }

    </script>
</body>
</html>
