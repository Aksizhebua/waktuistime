<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global TimeSync | Jam Dunia Real-Time</title>

    <!-- Google Fonts: Poppins for modern, clean UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Base Variables and Reset */
        :root {
            --bg-gradient-start: #0f2027;
            --bg-gradient-mid: #203a43;
            --bg-gradient-end: #2c5364;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --accent: #4facfe;
            --btn-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-mid), var(--bg-gradient-end));
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 0; /* allow hero to truly fill 1 layar */
            line-height: 1.6;
        }

        /* Layout & Containers */
        .container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* 1 layar hero untuk WIB (Jakarta) */
        .hero-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: clamp(2rem, 3vw, 2.5rem);
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: var(--btn-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--card-border);
            color: var(--text-main);
        }

        .section {
            margin-bottom: 3.5rem;
        }

        /* Responsive Grid: 1 col mobile, 2 cols desktop */
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Jakarta Hero Card */
        .hero-grid {
            display: flex;
            justify-content: center;
        }

        .hero-grid .card {
            width: 100%;
            max-width: 800px;
            padding: clamp(1.5rem, 4vw, 3rem);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(79, 172, 254, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .hero-grid .time-main {
            font-size: clamp(4.5rem, 12vw, 9rem);
            background: var(--btn-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }

        .hero-grid .time-sec {
            font-size: clamp(1.5rem, 4vw, 3rem);
        }

        .hero-grid .city-name {
            font-size: clamp(1.1rem, 2vw, 1.5rem);
            letter-spacing: 3px;
        }

        .hero-grid .date-display {
            font-size: clamp(1rem, 1.8vw, 1.25rem);
        }

        /* Glassmorphism Card Design */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .city-name {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }

        /* Typography for Time and Date */
        .time-display {
            display: flex;
            align-items: baseline;
            justify-content: center;
            margin-bottom: 0.5rem;
            font-variant-numeric: tabular-nums;
        }

        .time-main {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .time-sec {
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--accent);
            margin-left: 4px;
            display: inline-block;
        }

        .date-display {
            font-size: 1rem;
            font-weight: 300;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        /* Subtle Second Tick Animation */
        @keyframes pop {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.15); opacity: 1; color: #00f2fe; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .tick-anim {
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="hero-section">
            <header class="header">
                <h1>Global TimeSync</h1>
                <p>Pelacakan zona waktu real-time akurat</p>
            </header>

            <div class="section">
                <div class="hero-grid" id="jakarta-clock">
                    <!-- Jakarta Card injected via JS -->
                </div>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">Waktu Indonesia Lainnya</h2>
            <div class="grid" id="indonesia-clocks">
                <!-- Cards injected via JS -->
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">Jam Dunia</h2>
            <div class="grid" id="world-clocks">
                <!-- Cards injected via JS -->
            </div>
        </div>
    </div>

    <script>
        // Configuration for Clocks
        const clocksConfig = {
            jakarta: [
                { id: 'wib', name: 'WIB (Jakarta)', zone: 'Asia/Jakarta', city: 'Jakarta' }
            ],
            indonesia: [
                { id: 'wita', name: 'WITA (Makassar)', zone: 'Asia/Makassar', city: 'Makassar' },
                { id: 'wit', name: 'WIT (Jayapura)', zone: 'Asia/Jayapura', city: 'Jayapura' }
            ],
            world: [
                { id: 'london', name: 'London', zone: 'Europe/London', city: 'London' },
                { id: 'new_york', name: 'New York', zone: 'America/New_York', city: 'New York' },
                { id: 'tokyo', name: 'Tokyo', zone: 'Asia/Tokyo', city: 'Tokyo' },
                { id: 'dubai', name: 'Dubai', zone: 'Asia/Dubai', city: 'Dubai' }
            ]
        };

        // UI Generator Function
        function createClockCard(clock) {
            return `
                <div class="card" id="card-${clock.id}">
                    <div class="city-name">${clock.name}</div>
                    <div class="time-display">
                        <span class="time-main" id="time-${clock.id}">--:--</span>
                        <span class="time-sec" id="sec-${clock.id}">:--</span>
                    </div>
                    <div class="date-display" id="date-${clock.id}">Memuat tanggal...</div>
                </div>
            `;
        }

        // Initialize DOM Elements
        const jakartaContainer = document.getElementById('jakarta-clock');
        const indonesiaContainer = document.getElementById('indonesia-clocks');
        const worldContainer = document.getElementById('world-clocks');

        jakartaContainer.innerHTML = clocksConfig.jakarta.map(createClockCard).join('');
        indonesiaContainer.innerHTML = clocksConfig.indonesia.map(createClockCard).join('');
        worldContainer.innerHTML = clocksConfig.world.map(createClockCard).join('');

        // Combine all configurations into a flat array for easy iteration
        const allClocks = [...clocksConfig.jakarta, ...clocksConfig.indonesia, ...clocksConfig.world];

        // Formatters cache to optimize performance
        const formatters = {};
        allClocks.forEach(clock => {
            formatters[clock.id] = {
                time: new Intl.DateTimeFormat('id-ID', {
                    timeZone: clock.zone,
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hourCycle: 'h23'
                }),
                date: new Intl.DateTimeFormat('id-ID', {
                    timeZone: clock.zone,
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                })
            };
        });

        const previousSeconds = {};

        // Main Update Loop
        function updateClocks() {
            const now = new Date();

            allClocks.forEach(clock => {
                const clockFormatters = formatters[clock.id];

                // Time Parsing
                const timeParts = clockFormatters.time.formatToParts(now);
                let hours = '', minutes = '', seconds = '';

                timeParts.forEach(part => {
                    if (part.type === 'hour') hours = part.value;
                    if (part.type === 'minute') minutes = part.value;
                    if (part.type === 'second') seconds = part.value;
                });

                // Date Parsing
                const fullDate = clockFormatters.date.format(now);

                // DOM Updates
                document.getElementById(`time-${clock.id}`).textContent = `${hours}:${minutes}`;
                const secElement = document.getElementById(`sec-${clock.id}`);

                if (previousSeconds[clock.id] !== seconds) {
                    secElement.textContent = `:${seconds}`;
                    secElement.classList.remove('tick-anim');
                    void secElement.offsetWidth;
                    secElement.classList.add('tick-anim');
                    previousSeconds[clock.id] = seconds;
                }

                document.getElementById(`date-${clock.id}`).textContent = fullDate;
            });
        }

        updateClocks();
        setInterval(updateClocks, 1000);
    </script>
</body>
</html>
